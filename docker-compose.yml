version: "3.8"

services:
  app:
    build:
      context: .
      args:
        - EMAIL_USER=${EMAIL_USER}
        - EMAIL_PASS=${EMAIL_PASS}
        - PORT=${PORT}
        - MONGODB_URI=${MONGODB_URI}
        - ADMIN_EMAIL=${ADMIN_EMAIL}
        - ADMIN_PASSWORD=${ADMIN_PASSWORD}
        - JWT_SECRET=${JWT_SECRET}
    container_name: email_api_app
    ports:
      - "3004:3000"
    volumes:
      - ./backups:/app/backups
    depends_on:
      - mongodb
    networks:
      - email_network
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: email_api_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - email_network
    restart: unless-stopped

networks:
  email_network:
    driver: bridge

volumes:
  mongodb_data:
